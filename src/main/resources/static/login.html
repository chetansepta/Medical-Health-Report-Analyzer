<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Medical Health Report Analyzer</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="card auth-card">
            <div class="auth-logo">🏥</div>
            <h2>Medical Health Report Analyzer</h2>
            <p>Sign in to view your health dashboard</p>
            <div id="alert" style="display:none"></div>
            <form id="loginForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" required placeholder="you@example.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">
                    <span id="btnText">Sign In</span>
                </button>
            </form>
            <p style="margin-top:20px;">Don't have an account? <a href="/register.html">Register here</a></p>
        </div>
    </div>
    <script>
        if (localStorage.getItem('token')) window.location.href = '/dashboard.html';
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.disabled = true;
            btn.innerHTML = '<span class="loader"></span>';
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value
                    })
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('fullName', data.fullName);
                    window.location.href = '/dashboard.html';
                } else {
                    showAlert(data.error || 'Login failed', 'error');
                }
            } catch (err) { showAlert('Network error', 'error'); }
            btn.disabled = false;
            btn.innerHTML = '<span>Sign In</span>';
        });
        function showAlert(msg, type) {
            const el = document.getElementById('alert');
            el.className = 'alert alert-' + type;
            el.textContent = msg;
            el.style.display = 'block';
        }
    </script>
</body>
</html>

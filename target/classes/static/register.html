<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Medical Health Report Analyzer</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="card auth-card">
            <div class="auth-logo">🏥</div>
            <h2>Create Account</h2>
            <p>Start tracking your health today</p>
            <div id="alert" style="display:none"></div>
            <form id="registerForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="fullName" required placeholder="Dr. John Doe">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" required placeholder="you@example.com">
                </div>
                <div class="form-group">
                    <label>Password (min 6 characters)</label>
                    <input type="password" id="password" required minlength="6" placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">
                    <span id="btnText">Create Account</span>
                </button>
            </form>
            <p style="margin-top:20px;">Already have an account? <a href="/login.html">Sign in</a></p>
        </div>
    </div>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.disabled = true;
            btn.innerHTML = '<span class="loader"></span>';
            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        fullName: document.getElementById('fullName').value,
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value
                    })
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('fullName', data.fullName);
                    window.location.href = '/dashboard.html';
                } else {
                    showAlert(data.error || 'Registration failed', 'error');
                }
            } catch (err) { showAlert('Network error', 'error'); }
            btn.disabled = false;
            btn.innerHTML = '<span>Create Account</span>';
        });
        function showAlert(msg, type) {
            const el = document.getElementById('alert');
            el.className = 'alert alert-' + type;
            el.textContent = msg;
            el.style.display = 'block';
        }
    </script>
</body>
</html>
